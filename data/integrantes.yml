  perfiles:
    scholar: "https://scholar.google.com/citations?hl=es&user=1n8GpncAAAAJ"
  bio_corta: >-
    Doctora en Ciencias Biomédicas con orientación en Inmunología y Cirujana Dentista
    por la Universidad de Guadalajara, donde es Profesora de Asignatura B en el
    CUTlajomulco con nivel Candidata del SNII. Su investigación aborda la inmunología
    de las enfermedades orales y su relación con enfermedades sistémicas, con énfasis
