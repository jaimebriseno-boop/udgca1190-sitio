  orcid: "0000-0001-7637-2933"
  email: "gabriel.vega@academicos.udg.mx"
  perfiles:
    scholar: ""
  bio_corta: >-
    Médico cirujano y partero con especialidad en pediatría y formación de posgrado
    en reumatología pediátrica, además de maestrías en nutrición y dietética. Fundó
    el servicio de reumatología pediátrica del Hospital General de Occidente, dirige
    un centro de investigación (CREA) y es profesor e investigador asociado de
    tiempo completo en la Universidad de Guadalajara. Trabaja en artritis idiopática
    juvenil y terapias biológicas, vasculitis pediátricas, infecciones oportunistas
    en inmunosuprimidos y diagnóstico molecular de neumonía comunitaria infantil.
  intereses:
    - "Reumatología pediátrica y terapias biológicas"
    - "Vasculitis pediátricas (Kawasaki, Takayasu)"
    - "Infecciones oportunistas en inmunosuprimidos"
    - "Diagnóstico molecular de neumonía comunitaria infantil"
