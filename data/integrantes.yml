- id: rodriguez-montano
  nombre: "Ruth Rodríguez-Montaño"
  rol: integrante
  grado: "Doctora en Ciencias Biomédicas (Inmunología) · Cirujana Dentista"
  institucion: "Universidad de Guadalajara — CUTlajomulco"
