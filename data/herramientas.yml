# Herramientas estadístico-epidemiológicas y predictivas del CA.
# tipo:   predictiva | estadistica | pipeline
# estado: activa | beta | desarrollo
# linea:  id de una LGAC (data/lineas.yml)

- id: dengue-forecast
  nombre: "Dengue Forecast"
  tipo: predictiva
  estado: beta
  resumen: "Pronóstico probabilístico y alerta temprana de dengue para los 32 estados de México."
  descripcion: |
    Ensamble de pronóstico que combina modelos estadísticos (regresión con rezagos
    climáticos), aprendizaje automático (gradient boosting) y modelos espaciales
    bayesianos sobre un panel mensual de 15,591 observaciones por estado (1985–2026),
    con recalibración en línea por predicción conforme y un clasificador de alarma de
    brote (AUC 0.846 a un mes). Genera pronósticos a 1, 3, 6 y 12 meses para alerta y
    respuesta temprana (EWARS). Manuscrito en preparación (De Arcos-Jiménez y
    Briseño-Ramírez).
  tecnologias: ["R", "Gradient boosting", "Bayesian", "Conformal prediction"]
  linea: epidemiologia-infecciosas
  enlace_app: "/herramientas/dengue-forecast"
  repositorio: ""
  doi: ""
  captura: "/herramientas/placeholder.svg"
  destacado: true

- id: wisca-bayesiano
  nombre: "WISCA bayesiano"
  tipo: estadistica
  estado: activa
  resumen: "Antibiograma de incidencia ponderada por síndrome (modelo bayesiano)."
  descripcion: |
    Estimación de cobertura empírica mediante antibiogramas acumulados ponderados
    (Weighted-Incidence Syndromic Combination Antibiogram) con agrupamiento parcial
    bayesiano. Aplicado a endocarditis, candidosis invasiva, ITU comunitaria,
    neumonía asociada a ventilador y artritis séptica; estima cobertura por síndrome
    y estratos comunitario/asociado a la atención.
  tecnologias: ["R", "brms", "Stan"]
  linea: epidemiologia-infecciosas
  enlace_app: ""
  repositorio: ""
  doi: ""
  captura: "/herramientas/placeholder.svg"
  destacado: true

- id: genomica-wgs
  nombre: "Pipeline de genómica microbiana (WGS)"
  tipo: pipeline
  estado: activa
  resumen: "Ensamblado, tipificación y resistencia genotípica desde secuenciación."
  descripcion: |
    Flujo reproducible de secuenciación de genoma completo para aislados clínicos:
    control de calidad, ensamblado, tipificación (MLST/SCCmec) y detección de
    determinantes de resistencia. Aplicado a S. aureus/MRSA y a Enterococcus
    faecalis resistente a linezolid.
  tecnologias: ["Nextflow", "SPAdes", "ABRicate", "Python"]
  linea: biologia-molecular
  enlace_app: ""
  repositorio: ""
  doi: ""
  captura: "/herramientas/placeholder.svg"
  destacado: false

- id: series-tiempo-epi
  nombre: "Series de tiempo epidemiológicas"
  tipo: estadistica
  estado: activa
  resumen: "Tendencias, estacionalidad y número reproductivo de enfermedades."
  descripcion: |
    Conjunto de métodos para analizar tendencias, estacionalidad y disrupciones en
    series de vigilancia (sarampión, dengue, virus respiratorios, RAM): descomposición
    STL, modelos GAM/Fourier, número reproductivo instantáneo (Rt) y series de tiempo
    interrumpidas (ITS).
  tecnologias: ["R", "EpiEstim", "forecast"]
  linea: ciencia-datos-poblacionales
  enlace_app: ""
  repositorio: ""
  doi: ""
  captura: "/herramientas/placeholder.svg"
  destacado: false

- id: analisis-espacial
  nombre: "Análisis espacial y determinantes poblacionales"
  tipo: estadistica
  estado: desarrollo
  resumen: "Autocorrelación espacial y determinantes a escala municipal."
  descripcion: |
    Análisis ecológico a escala poblacional para identificar desigualdades,
    desiertos de atención y mortalidad evitable: autocorrelación espacial (Moran's I,
    LISA), modelos multinivel y vinculación de registros nacionales con índices de
    marginación.
  tecnologias: ["R", "sf", "spdep"]
  linea: ciencia-datos-poblacionales
  enlace_app: ""
  repositorio: ""
  doi: ""
  captura: "/herramientas/placeholder.svg"
  destacado: false
